global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # 1. Prometheus 自身監控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. 後端 FastAPI 應用
  - job_name: 'ambush-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 15s

  # 3. PostgreSQL (直接監控 DB 服務)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['db:5432']

  # 4. Redis (直接監控 Redis 服務)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # 5. Celery Worker
  - job_name: 'celery-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['celery-worker:8001']
    scrape_interval: 30s
