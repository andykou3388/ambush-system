# Docker Compose 檔案 - 開發環境

services:
  # 後端服務
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev_user:dev_pass_123@db:5432/ambush_dev}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DEBUG=${DEBUG:-true}
    volumes:
      - ./backend/app:/app/app
      - /app/__pycache__
      - /app/.pytest_cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ambush-network

  # 前端服務
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - ambush-network

  # 數據庫服務
  db:
    image: postgres:13
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=ambush_dev
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_pass_123
      - TZ=Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d ambush_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ambush-network

  # Redis 服務
  redis:
    image: redis:6-alpine
    volumes:
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ambush-network

  # Celery Worker 服務
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev_user:dev_pass_123@db:5432/ambush_dev}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DEBUG=${DEBUG:-true}
    volumes:
      - ./backend/app:/app/app
      - /app/__pycache__
      - /app/.pytest_cache
    command: celery -A app.celery_app worker --loglevel=info --uid=nobody -n worker@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ambush-network

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ambush-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - ambush-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ambush-grafana
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - ambush-network
    depends_on:
      - prometheus
    restart: unless-stopped


volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  ambush-network:
    driver: bridge
