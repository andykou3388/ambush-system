# CORE-02 规则引擎 V1 配置文件
# 超级强势股 5层规则参数

# 第1层：趋势规则（MA10 / MA30）
trend:
  ma10_period: 10
  ma30_period: 30
  long_condition: close > ma10
  short_condition: close < ma10
  strong_trend: close > ma30
  weak_trend: close < ma30

# 第2层：量能与突破规则
volume:
  volume_boost_ratio: 1.5       # 放量 >= 5倍
  volume_boost_duration: 1      # 当周放量
  breakout_confirm: 1           # 突破底部确认

# 第3层：低风险买点（回踩10周均线）
buy_point:
  touch_ma10_tolerance: 0.03    # 允许3%误差
  min_volume_ratio: 0.5         # 缩量至50%以下
  narrow_range_ratio: 0.04      # 周波幅<=4%为窄幅

# 第4层：价格与估值
price_valuation:
  max_price: 100.0               # 股价<100元
  max_pe: 40.0                  # PE<10倍
  max_market_cap: 5000000000000    # 市值<50亿

# 第5层：基本面辅助
fundamental:
  low_debt_ratio: 0.6
  low_float_ratio: 0.2
  no_analyst_cover: true
  insider_buy_required: true